<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>
GPA Navigator β
</title>

<link
rel="stylesheet"
href="style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<div class="container">

<h1>🎓 GPA Navigator</h1>

<p class="subtitle">

履修データから

あなたの強み・おすすめ履修・資格・業界を分析

</p>

<div class="card">

<label>
履修科目（カンマ区切り）
</label>

<textarea
id="subjects">
解析Ⅰ,線形代数Ⅰ,英語
</textarea>

</div>

<div class="card">

<label>
成績（カンマ区切り）
</label>

<textarea
id="scores">
90,85,70
</textarea>

</div>

<button onclick="analyze()">

分析する

</button>

<br><br>

<div class="card">

<pre id="result"></pre>

</div>

<div class="footer">

GPA Navigator β

</div>

</div>
<script src="app.js"></script>
</body>
</html>
