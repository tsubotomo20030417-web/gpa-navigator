<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>
GPA Navigator β
</title>

<link
rel="stylesheet"
href="style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<div class="container">

<h1>🎓 GPA Navigator</h1>

<p class="subtitle">

履修データから

あなたの強み・おすすめ履修・資格・業界を分析

</p>

<div class="card">

<label>
科目検索
</label>

<input
type="text"
id="subjectSearch"
placeholder="科目名を入力">

<div id="suggestions"></div>

</div>

<div class="card">

<label>
履修科目一覧
</label>

<div id="selectedSubjects">

</div>

</div>

<button onclick="analyze()">

分析する

</button>

<br><br>

<div class="card">

<pre id="result"></pre>

</div>

<div class="footer">

GPA Navigator β / Developed by Tomoki T.

</div>

</div>
<script src="app.js"></script>
</body>
</html>
